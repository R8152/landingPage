<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Complete seu pedido</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/completar_pedido.css">
</head>
<body>
    <header class="">
        <img src="/imagens/Logo.svg" alt="Logo Coffee Delivery">
        <div class="flex gap-3">
            <div class="bg-[#EBE5F9] rounded-md flex items-center gap-1 p-2">
                <img class="absolute-right-20" src="/imagens/Vector (7).png" alt="ícone localização">
                <span>Porto Alegre, RS</span>
            </div>
            <button class="btn-cart bg-[#F1E9C9] w-[38px] rounded-md">
                <img src="/imagens/Vector (6).png" alt="icone carrinho" class="m-[8px]">
            </button>  
        </div>
    </header>
    <section class="completar_pedido">
        <h2 class="texto_completar">Complete seu pedido</h2>
        <main class="infos_pedido">
            <main class="text-endereco">
                <div class="img-endereco">
                    <img src="/local2.png" alt="local2">
                </div>
                <div class="endereco">
                    <span class="text1-endereco">Endereço de Entrega</span>
                    <span class="text2-endereco">Informe o endereço onde deseja receber seu pedido</span>
                </div>
            </main>
            <br>
            <main class="informacoes">
                <main class="info1">
                    <span class="cep">CEP</span>
                </main>
                <main class="info2">
                    <span class="rua">Rua</span>
                </main>
                <main class="info3">
                    <div class="div-numero">
                        <span class="numero">Número</span>
                    </div>
                    
                    <div class="complemento">
                        <span class="c1">Complemento</span>
                        <span class="c2">Opcional</span>
                    </div>
                </main>
                <main class="info4">
                    <div class="i41">
                        <span>Bairro</span>
                    </div>
                    <div class="i42">
                        <span>Cidade</span>
                    </div>
                    <div class="i43">
                        <span>UF</span>
                    </div>
                </main>
            </main>
            
        </main>
    </section>
</body>
</html>

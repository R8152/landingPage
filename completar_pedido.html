<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>Complete seu pedido</title>

<body>
    <header class="">
        <img src="/imagens/Logo.svg" alt="Logo Coffee Delivery">
        <div class="flex gap-3">
            <div class="bg-[#EBE5F9] rounded-md flex items-center gap-1 p-2">
                <img class="absolute-right-20" src="/imagens/Vector (7).png" alt="ícone localização">
                <span>Porto Alegre, RS</span>
            </div>
            <button class="btn-cart bg-[#F1E9C9] w-[38px] rounded-md">

            </button>
        </div>
    </header>
    <section class="completar_pedido">
        <h2 class="texto_completar">Complete seu pedido</h2>
        <main class=" h-[372px] w-[640px] bg-[#F3F2F2] rounded-md leading-[130%]">
            <main class="h-[44px] w-[560px] pl-[40px] pt-[40px] flex flex-row">
                <div class="pr-[8px]">
                    <img src="/local2.png" alt="local2">
                </div>
                <div class="flex flex-col">
                    <span class="text-[16px] text-[#403937]">Endereço de Entrega</span>
                    <span class="text-[14px] text-[#574F4D]">Informe o endereço onde deseja receber seu pedido</span>
                </div>
            </main>
            <main class="pl-[40px] pt-[32px]">
                <main class="info1">
                    <span class="cep m-[12px] text-center">CEP</span>
                </main>
                <main class="h-[42px] w-[560px] bg-[#EDEDED] rounded-md pb-[16px]">
                    <span>Rua</span>
                </main>
                <main class="h-[42px] w-[560px] bg-[#F1E9C9] rounded-md pb-[16px]">
                    <span>Número</span>
                    <span>Complemento</span>
                </main>
                <main>

                </main>
                </main>
            
        </main>
    </section>

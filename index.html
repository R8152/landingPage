<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Coffee Delivery</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <header>
        <img src="/imagens/Logo.svg" alt="Logo Coffee Delivery">
        <div class="div-header-right">
            <div class="div-local">
                <img src="/imagens/Vector (7).png" alt="ícone localização">
                <span>Porto Alegre, RS</span>
            </div>
            <button class="btn-cart">
                <img src="/imagens/Vector (6).png" alt="ícone carrinho">
            </button>
        </div>
    </header>
    <section>
        <div class="main_informar">
            <h1 class="title_maininformar">Encontre o café perfeito para qualquer hora do dia</h1>
            <p class="subtitle_maininformar">Com o Coffee Delivery, você recebe seu café onde estiver, a qualquer hora</p>
            <br>
            <main class="table-vantagens">
                <ul class="lista-vantagens">
                    <li class="v1">
                        <img src="/Carrinho.png" alt="ícone carrinho 2" class="carrinho2 img-banner">
                        <span style="font-size: 16px; height: 21px; width: 187px;">Compra simples e segura</span>
                    </li>
                    <li class="v2">
                        <img src="/Timer.png" alt="ícone timer" class="timer img-banner">
                        <span style="font-size: 16px; height: 21px; width: 187px;">Entrega rápida e rastreada</span>
                    </li>
                    <li class="v3">
                        <img src="/Caixa.png" alt="ícone caixa" class="caixa img-banner">
                        <span style="font-size: 16px; height: 21px; width: 250px;">Embalagem mantém o café intacto</span>
                    </li>
                    <li class="v4">
                        <img src="/Cafezinho.png" alt="ícone cafézinho" class="cafezinho img-banner">
                        <span style="font-size: 16px; height: 21px; width: 250px;">O café chega fresquinho até você</span>
                    </li>
                </ul> 
            </main> 
        </div>
        <div class="imagem_copo">
            <img src="imagens/Imagem.svg" alt="" height="360px">
        </div>
    </section>
</body>
</html>

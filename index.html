<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Delivery</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <header>
        <img src="/imagens/Logo.svg" alt="Logo Coffee Delivery">
        <div class="div-header-right">
            <div class="div-local">
                <img src="/imagens/Vector (7).png" alt="ícone localização">
                <span>Porto Alegre, RS</span>
            </div>
            <button class="btn-cart">
                <img src="/imagens/Vector (6).png" alt="ícone carrinho">
            </button>
        </div>
    </header>
    <section>
        <div class="main_informar">
            <h1 style="font-family: Arial, Helvetica, sans-serif; font-size: 48px; height: 124px; width: 588px; color: #272221;">Encontre o café perfeito para qualquer hora do dia</h1>
            <br><br><br><br><br>
            <p style="font-family: Arial, Helvetica, sans-serif; font-size: 20px; height: 52px; width: 588px; color: #403937;">Com o Coffee Delivery, você recebe seu café onde estiver, a qualquer hora</p>
            <br><br><br>
            <main class="table-vantagens">
                <main class="v12">
                    <div class="v1">
                        <img src="/Carrinho.png" alt="ícone carrinho 2" class="carrinho2">
                        <h3 style="font-size: 16px; height: 21px; width: 187px;">Compra simples e segura</h3>
                    </div>
                    <div class="v2">
                        <img src="/Timer.png" alt="ícone timer" class="timer">
                        <h3 style="font-size: 16px; height: 21px; width: 187px;">Entrega rápida e rastreada</h3>
                    </div> 
                </main>
                <main class="v34">
                    <div class="v3">
                        <img src="/Caixa.png" alt="ícone caixa" class="caixa">
                        <h3 style="font-size: 16px; height: 21px; width: 250px;">Embalagem mantém o café intacto</h3>
                    </div>
                    <div class="v4">
                        <img src="/Cafezinho.png" alt="ícone cafézinho" class="cafezinho">
                        <h3 style="font-size: 16px; height: 21px; width: 250px;">O café chega fresquinho até você</h3>
                    </div>
                </main> 
            </main> 
        </div>
        <div class="imagem_copo">
            <img src="imagens/Imagem.svg" alt="" height="360px">
        </div>
    </section>
</body>
</html>

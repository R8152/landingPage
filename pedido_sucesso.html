<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Coffee Delivery - Success</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/pedido_sucesso.css">
</head>
<body>
    <header class="flex justify-between py-8 px-40 bg-white sticky top-0 z-50 shadow-2g">
        <img src="/imagens/Logo.svg" alt="Logo Coffee Delivery">
        <div class="sm:hidden text-2x1 text-[#8047F8]">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="hidden sm:flex gap-3">
            <div class="bg-[#EBE5F9] rounded-md flex items-center gap-1 p-2">
                <img class="absolute-right-20" src="/imagens/Vector (7).png" alt="Ícone Localização">
                <span class="text-[#4B2995] font-[Roboto]">Porto Alegre, RS</span>
            </div>
            <button class="btn-cart bg-[#F1E9C9] p-2 rounded-md">
                <img src="/imagens/Vector (6).png" alt="icone carrinho">
            </button>
        </div>
    </header>
    <section class="pl-[160px]">
        <table>
            <td>
                <main>
                    <h1 class="text-[#C47F17] font-extrabold text-[32px] font-(family-name: --font-baloo)">Uhu! Pedido confirmado</h1>
                    <span class="text-[20px] font-[Roboto]">Agora é só aguardar que logo o café chegará até você</span>
                    <main class="h-[270px] w-[526px] mt-[40px] rounded-tr-xl rounded-bl-xl bg bg-linear-50 from-[#DBAC2C] to-[#8047F8] text-[#574F4D] flex justify-center items-center">
                        <main class="bg-white h-[269px] w-[525px] rounded-tr-xl rounded-bl-xl">
                            <div class="flex flex-row mt-[40px] ml-[40px]">
                                <img src="/Local.png" alt="" class="w-[32px] h-[32px] my-[6px]">
                                <div class="flex flex-col ml-[12px]">
                                    <span>Entrega em <span class="font-bold">Rua João Daniel Martinelli, 102</span></span>
                                    <span>Farrapos - Porto Alegre, RS</span>
                                </div>   
                            </div>
                            <div class="flex flex-row pl-[40px] my-[32px]">
                                <img src="/Relogio.png" alt="" class="w-[32px] h-[32px] my-[6px]">
                                <div class="flex flex-col ml-[12px]">
                                    <span>Previsão de entrega</span>
                                    <span class="font-bold">20 min - 30 min</span>   
                                </div>   
                            </div>
                            <div class="flex flex-row pl-[40px]">
                                <img src="/Dinheiro.png" alt="" class=" w-[32px] h-[32px] my-[6px]">
                                <div class="flex flex-col ml-[12px]">
                                    <span>Pagamento na entrega</span>
                                    <span class="font-bold">Cartão de Crédito</span>
                                </div>
                            </div>
                        </main>
                    </main>
                </main>                
            </td>
            <td class="pl-[102px] pt-[120px]">
                <img src="/Illustration.png" alt="">
            </td>
        </table>

    </section>
</body>
</html>
